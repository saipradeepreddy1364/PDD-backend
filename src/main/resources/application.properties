server.port=${PORT:8080}
spring.application.name=PDD-pradeep-backend

# Flask runs inside same container on port 5000
flask.api.url=${FLASK_API_URL:http://localhost:5000}

# CORS — your React Vercel URL
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging.level.com.diaslab=DEBUG
logging.level.org.springframework.web=INFO